name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Check script syntax
        run: python -m py_compile suno-lyric-writer/scripts/build_suno_prompt.py suno-lyric-writer/scripts/media_reference_probe.py suno-lyric-writer/scripts/deep_audio_analyze.py
      - name: Lint
        run: python -m ruff check .
      - name: Run tests
        run: python -m pytest --cov=suno-lyric-writer/scripts --cov-report=term-missing -q
